<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المكتبة - نظام الطلبيات</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="products_v20260418150542.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- شريط التنبيه -->
  <div class="alert-bar" id="alertBar"></div>

  <!-- ═══════════════════════════════════════════
       الشريط العلوي
       ═══════════════════════════════════════════ -->
  <header class="header">
    <div class="header-content">

      <!-- اسم المتجر -->
      <div class="store-title" id="storeName">جارٍ التحميل...</div>

      <!-- أدوات الهيدر -->
      <div class="header-tools">

        <!-- ✅ زر السلة في الهيدر -->
        <button class="header-cart-btn" onclick="toggleCart()" title="سلة المشتريات">
          <span class="header-cart-icon">🛒</span>
          <span class="header-cart-label">السلة</span>
          <span class="header-cart-total" id="cartTotalHeader">0.00</span>
          <span class="header-cart-badge hidden" id="cartBadge">0</span>
        </button>

      </div>
    </div>
  </header>

  <!-- البحث الثابت -->
  <div class="search-sticky">
    <div class="search-container">

      <!-- شريط البحث + زر الفلاتر -->
      <div class="search-bar-row">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text"
                 class="search-input"
                 id="searchInput"
                 placeholder="ابحث عن منتج..."
                 autocomplete="off">
          <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
        </div>
        <button class="btn-filter-toggle" id="filterToggle" onclick="toggleFilters()">
          <span>فلاتر</span>
          <span class="filter-arrow" id="filterArrow">🔽</span>
          <span class="filter-active-count hidden" id="filterActiveCount">0</span>
        </button>
      </div>

      <!-- منطقة الفلاتر -->
      <div class="filters-area hidden" id="filtersArea">
        <div class="filters-tags-wrap" id="filtersTagsWrap">
          <!-- يتم توليدها من JS -->
        </div>
        <button class="btn-filter-reset hidden" id="filterReset" onclick="resetFilters()">
          ✕ إعادة تعيين الفلاتر
        </button>
      </div>

    </div>
    <!-- عدد النتائج -->
    <div class="results-info" id="resultsInfo"></div>
  </div>

  <!-- شبكة المنتجات -->
  <main class="products-container">
    <div class="products-grid" id="productsGrid">
      <div class="loading">
        <div class="spinner"></div>
        <p>جارٍ تحميل المنتجات...</p>
      </div>
    </div>
  </main>

  <!-- التذييل -->
  <footer class="footer" id="footer">
    <div class="footer-phone">
      📞 <a href="tel:+201274806845">01274806845</a>
    </div>
    <div class="footer-text" id="footerText"></div>
  </footer>

  <!-- خلفية معتمة للوحات الجانبية -->
  <div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

  <!-- ═══════════════════════════════════════════
       لوحة السلة
       ═══════════════════════════════════════════ -->
  <aside class="side-panel cart-panel" id="cartPanel">
    <div class="panel-header">
      <h2>🛒 سلة المشتريات</h2>
      <button class="panel-close" onclick="closeCart()">✕</button>
    </div>
    <div class="panel-body" id="cartBody"></div>
    <div class="panel-footer" id="cartFooter"></div>
  </aside>

  <!-- ═══════════════════════════════════════════
       لوحة السجل
       ═══════════════════════════════════════════ -->
  <aside class="side-panel history-panel" id="historyPanel">
    <div class="panel-header">
      <h2>📋 الطلبيات السابقة</h2>
      <button class="panel-close" onclick="closeHistory()">✕</button>
    </div>
    <div class="panel-body" id="historyBody"></div>
    <div class="panel-footer" id="historyFooter"></div>
  </aside>

  <!-- ═══════════════════════════════════════════
       Modal بيانات العميل
       ═══════════════════════════════════════════ -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal">
      <div class="modal-head">
        <h3>📋 بيانات الطلبية</h3>
        <button class="modal-x" onclick="closeCheckout()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label><span class="req">★</span> الاسم</label>
          <input type="text" id="buyerName" placeholder="اسم العميل">
          <div class="err-msg" id="nameErr">⚠️ الاسم مطلوب</div>
        </div>
        <div class="form-group">
          <label><span class="req">★</span> الهاتف</label>
          <input type="tel" id="buyerPhone" placeholder="01XXXXXXXXX">
          <div class="err-msg" id="phoneErr">⚠️ الهاتف مطلوب</div>
        </div>
        <div class="form-group">
          <label>📝 ملاحظات (اختياري)</label>
          <textarea id="buyerNotes" placeholder="أي تعليمات إضافية..."></textarea>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-primary" onclick="sendToWhatsApp()">
          📤 إرسال الطلبية
        </button>
        <button class="btn-secondary" onclick="closeCheckout()">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       Modal تأكيد
       ═══════════════════════════════════════════ -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <span class="confirm-icon" id="cfmIcon">⚠️</span>
      <h4 id="cfmTitle">تأكيد</h4>
      <p id="cfmMsg">هل أنت متأكد؟</p>
      <div class="confirm-btns">
        <button class="btn-confirm-yes" id="cfmYes">نعم</button>
        <button class="btn-confirm-no" onclick="closeConfirm()">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       Feature 2 — Onboarding Overlay
       ═══════════════════════════════════════════ -->
  <div class="onboarding-overlay" id="onboardingOverlay">
    <div class="onboarding-card">
      <span class="ob-icon" id="obIcon">🏷️</span>
      <div class="ob-title" id="obTitle"></div>
      <div class="ob-desc"  id="obDesc"></div>
      <div class="ob-dots"  id="obDots"></div>
      <div class="ob-actions">
        <button class="ob-btn-next" id="obNextBtn" onclick="nextOnboardingStep()">
          التالي ←
        </button>
        <button class="ob-btn-skip" id="obSkipBtn" onclick="skipOnboarding()">
          تخطي
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       Feature 3 — دليل المستخدم
       ═══════════════════════════════════════════ -->
  <div class="guide-overlay" id="guideModal">
    <div class="guide-modal">
      <div class="guide-head">
        <h3>📖 طريقة الطلب</h3>
        <button class="guide-close" onclick="closeGuide()">✕</button>
      </div>
      <div class="guide-body" id="guideSteps"></div>
      <div class="guide-footer">
        <button class="ob-btn-next" onclick="closeGuide()">
          ✅ فهمت، هبدأ!
        </button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       Toast
       ═══════════════════════════════════════════ -->
  <div class="toast-wrap" id="toastWrap"></div>

  <!-- ═══════════════════════════════════════════
       الأزرار العائمة (FABs)
       ═══════════════════════════════════════════ -->

  <!-- ✅ زر واتساب للمجموعة -->
  <a class="fab-whatsapp-group"
     href="https://chat.whatsapp.com/HDxgTtrJfb2FGRulY26YiB"
     target="_blank"
     rel="noopener noreferrer"
     title="انضم لمجموعة الواتساب">
    💬
  </a>

  <!-- زر المساعدة -->
  <button class="fab-help"
          id="fabHelp"
          onclick="toggleHelpMenu()"
          title="مساعدة">
    ❓
  </button>

  <!-- قائمة المساعدة المنبثقة -->
  <div class="help-menu" id="helpMenu">
    <button class="help-menu-item" onclick="showGuide()">
      <span class="hmi-icon">📖</span>
      <span>طريقة الطلب</span>
    </button>
    <button class="help-menu-item" onclick="replayOnboarding()">
      <span class="hmi-icon">🎓</span>
      <span>إعادة الجولة التعريفية</span>
    </button>
  </div>

  <!-- زر سجل الطلبيات -->
  <button class="fab-history"
          onclick="toggleHistory()"
          title="الطلبيات السابقة">
    📋
    <span class="badge hidden" id="historyBadge">0</span>
  </button>

  <!-- ═══════════════════════════════════════════
       السكريبت الرئيسي
       ═══════════════════════════════════════════ -->
  <script src="app.js"></script>

</body>
</html>
